services:
  db:
    container_name: db
    image: postgres:16
      - ./backend/.env
    restart: always
    ports:
      - 5000:5432
    volumes:
      - banco_data:/var/lib/postgresql/data

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - db

volumes:
  banco_data:
